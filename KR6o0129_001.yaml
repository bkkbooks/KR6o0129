body:
  text: 大唐三藏法師義淨譯此頌是龍樹菩薩以詩代書寄與南印度親友乘土國王一首此書已先譯神州處藏人多不見遂令妙語不得詳知為此更定本文冀使流通罔滯沙門義淨創至東印度耽摩立底國譯有情無知覆心故由此興悲為開解大德龍樹為國王寄書與彼令修學此一行頌乃是後人所述標書本意也具德我演如如教為生福愛而興述真善宜應可審聽此頌名為聖祇底隨何木等雕佛像諸有智者咸供養縱使我詩非巧妙依正法說勿當輕王雖先解如如教更聞佛語增勝解猶如粉壁月光輝豈不鮮明益姝妙佛法并僧衆施戒及與天一一功德聚佛說應常念十善諸業道身語意常親遠離於諸酒亦行清淨命知財體非固如法施苾芻貧賤及再生來世為親友衆德依戒住如地長一切勿冗瘦雜悕佛說應常習施戒忍勇定惠不可稱量此能到應修渡有海成佛若孝養父母其家有梵王現招善名稱來世生天堂殺盜淫妄說耽食愛高床斷諸酒歌舞華彩及塗香若女男能成此八支聖戒欲界六天上長淨善當生慳諂誑貪怠慢淫嗔氏族多聞年少嬌並視如怨賊說無生由勤有死因放逸勤能長善法爾可修謹慎先時離放逸後若改勤修猶如雲翳除良宵覩明月孫陀羅難陀央具理摩羅達舍綺莫迦翻惡皆成善勇進無同忍勿使忿勢行終得不還位佛證可除嗔他人打罵我欺陵奪我財懷恨招怨諍捨恨眠安樂如於水土石人心盡彼同起煩惱前勝愛法者如後佛說三種語人美實虛言猶如蜜花糞棄後可行前今明後亦明今暗後還暗或今明後暗或今暗後明如是四種人王當依第一自有生如熟亦有熟如生亦有熟如熟或復生如生菴沒羅果中有如是差別人亦同彼四難識王應知勿覩他妻室設觀如母女姊妹想隨年起貪思不淨如聞子藏命防持躁動心獸藥刀怨火無令欲樂侵由欲作無利譬如兼博果佛說彼應除生死牢枷鎖譎誑常搖境能降斯六識執仗掃衆怨許初為勇極臭氣九門衆穢室行軀難滿薄皮纏請看少女除莊彩折別形骸惡叵言癩蟲穿已痛求安就火邊止息無由免耽欲亦同然為知真勝理作意觀衆事唯斯德應習無餘法可親若人具族望貌美復多聞無智破尸羅是人何足貴若人無族望貌醜寡知聞有智護尸羅人皆應供養利無利苦樂稱無稱毀譏了俗世八法齊心離斯境再生天乞士父母妻子人勿由斯造罪獄果他不分若行諸罪業非如刀斬傷待至臨終際惡業果全彰信戒施淨聞慚愧及正慧七財牟尼說共有物誠虛博奕樂觀喧雜境懶惰惡友敦親志飲酒非時行六過此劫芳名爾應棄求財少欲最人天師盛陳若能修少欲雖貧是富人若人廣求諸事者還被爾許苦來加智者若不修少欲受惱還如衆首蛇稟性抱怨如殺者欺輕夫主如男偶縱使片物必行偷宜可棄茲三賊婦順若姊妹慈如母隨從若婢伴猶親如茲四婦宜應供應知此室號天人受餐如服藥知量去貪嗔不為肥憍傲但欲住持身勤軀度永日於初後夜中眠夢猶存念勿使命虛終慈悲喜正捨修習可常研上流雖未入能生梵世天捨離欲苦尋喜樂隨業當生四地中大梵光音及遍淨廣果天生與彼同若恆修對治德勝愍衆生此五行為善不行為大惡雨鹽醎少水豈若瀉江池縱令微罪業善大殄應知嗔掉舉惡作惛睡欲貪疑如斯五蓋賊常偷諸善利有五最勝法信勇念定慧於此應勤習能招根力頂病苦死愛別斯皆自業為未度可勤修對品亡嬌恣若悕天解脫爾當修正見設使人行善邪見招惡果無樂常無我不淨審知人妄念四倒見難苦在茲身說色不是我我非有於色色我非更在知餘四蘊空不從時節生非自然本性非無因自在從愚業愛生戒禁見身見及毗織吉蹉應知三種結能縛木叉門解脫終依己不由他伴成勤修聞戒定四真諦便生增上戒心慧茲學可常修百五十餘戒咸歸此三攝於身住身念茲路善修常如其虧正念諸法盡淪亡壽命多災厄如風吹水泡若得瞬息停臥起成希有卒歸灰燥爛糞穢難久持觀身非實法滅壞墮分離大地迷盧海七日出燒燃況此極微軀那不成煨燼如是無常亦非久無歸無救無家室生死勝人須厭背併若芭蕉體無實海龜投木孔一會甚難遭棄畜成人體惡行果還招金寶盤除糞斯為是大癡若生人作罪全成極憃兒生中依善友及發於正願先身為福業四大輪全獲佛言近善友全梵行是親善士依佛故衆多證圓寂邪見生鬼畜泥黎法不聞邊地蔑戾車生便癡啞性或生長壽天除八無暇過間暇既已得爾可務當生愛別老病死斯等衆苦處智者應生厭說少過應聽母或改為婦父乃轉成兒怨家翻作友遷流無定規一一飲母乳過於四海水轉受異生身更飲多於彼過去一一生身骨展轉積若妙高山地土丸為酸棗核數己形軀豈盡邊梵主世皆供業力終淪地縱紹轉輪王回身化奴使三十三天中妓女樂多時受已墮泥黎速疾磣毒經諸苦磨身碎體鎮號啼妙高岑受樂地軟隨其足轉受煻煨苦行經糞屎獄歡喜芳園裏天女隨遊戲墮落劍林中截手足耳鼻或入曼陀妙池浴天女金花艷彩容捨身更受泥黎苦熱焰難當灰㵎中欲天受法樂除貪大梵天更墮阿毗止薪焰苦恆連或生居日月身光遍四洲一朝歸黑暗展手見無由三種燈明福死後可持將獨入無邊暗日月不流光有命黑繩熱合叫無間下斯等恆纏苦燒諸行惡者或若麻床㧗或粉如細末如利斧斫木猶如鋸解割猛火恆煎煮令飲熱銅漿驅令上劍刺叉身熱鐵床或時高舉手鐵牙猛狗餐鷹鳥觜爪利任彼啅心肝虻蠅及諸蟲其數過千億利觜唼身軀急墮皆餐食若人具造衆罪業聞苦身自不干墮如此頑騃金剛性氣盡泥犁遭猛火時觀盡變聞應念讀誦經論常尋鞠泥犁聽響已驚惶如何遣當斯異熟於諸樂中誰是最愛盡無生樂最精於衆苦內誰為極無間泥犁苦極成人間一日中屢刺三百槊比地獄輕苦毫分寧相捅此處受極苦經百俱胝秋如其惡未盡命捨定無由如是諸惡果種由身語心爾勤隨力護輕塵惡勿侵或入傍生趣殺縛苦恆親遠離於寂善更互被艱辛或被殺縛苦求珠尾角皮錐鞭鉤𣃆頂踏拍任他騎受鬼望不遂無敵苦常臨飢渴及冷熱困怖苦恆侵口小如針孔腹大等山丘飢纏縱己糞得少定無由形如枯杌樹皮方作衣服炬口夜夜然飛蛾墮充食血膿諸不淨福少獲無從更相口排逼還餐癭熟癰月下便招熱日中身遂寒望果唯空樹瞻江水剩乾如是受衆苦經萬五千年長時擊身命良由苦器堅若生飢鬼中遭斯一味苦非賢澀者愛佛說由慳垢生天雖受樂福盡苦難思終歸會墜墮勿樂可應知厭坐衣沾垢身光有變衰液下新流汗頭上故花萎如斯五相現天衆死無疑地居人若卒悶亂改常儀若從天處墮衆善盡無餘任落傍生鬼泥犁隨一居阿蘇羅本性縱令全覺慧忿天生苦心趣遮於見諦如是漂流生死處天人畜及阿蘇羅下賤業生衆苦器鬼趣兼投捺落迦縱使烈火燃頭上遍身衣服焰皆通此苦無暇能除拂無生住想涅槃中爾求尸羅及定慧寂靜調柔離垢殃涅槃無盡無老死四大日月悉皆亡念擇法勇進定慧喜輕安此七菩提分能招妙涅槃無慧定非有缺定慧便溺若其雙運者有海如牛跡十四不記法日親之所說於此勿應思不能令覺滅從無知起業由業復生識識緣於名色名色生六處六處緣於觸觸生緣於受受既緣於愛由愛招於取取復緣於有有復緣於生生緣於老死憂病求不得輪回大苦蘊斯應速斷除如其生若滅衆苦殄無餘最勝言教藏深妙緣起門如能正見此便觀無上尊正見命正念正定語業思此謂八聖道為寂可修治無由集愛起託身衆苦生除斯證解脫八聖道宜行即此瑜伽業四種聖諦因雖居舍嚴飾智遮煩惱津不從空處墮如穀因地造諸先證法人皆凡具煩惱何假多陳述除惱略呈言事由情可伏聖談心是源如上所陳法苾芻難總行隨能修一事勿令虛夭生衆善皆隨喜妙行三自修回向為成佛福聚令恆收後生壽無量廣度於天人猶如觀自在極難等怨親生老病死三毒除佛國託生為世父壽命時長量叵知同彼大覺彌陀主開顯尸羅及捨慧天地虛空名遍彰大地居人及天衆勿使妖妍女愛傷煩惱羈纏有情衆絶流生死登正覺超度世間但有名由獲無生離塵濁阿離野那伽曷樹那菩提薩埵蘇頡里蜜離佉了阿離野是聖那伽是龍是象曷樹那義翻為猛菩提薩埵謂是覺情蘇頡里即是親密離佉者書也先云龍樹者訛也
